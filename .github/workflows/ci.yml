name: Next.js CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    # The strict standalone 'npm run lint' step has been removed.

    - name: Test Production Build
      # Next.js builds still do baseline type-checking, ensuring the app won't crash in production.
      run: npm run build